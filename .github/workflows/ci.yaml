name: Build the docker image

on:
  push:
    branches:
      - main
    
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Build the docker image
        run: |
          docker build -t voting_app:latest .
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the docker image to GitHub Container Registry
        run: |
          docker tag voting_app:latest ghcr.io/mohamed-yasin-km/voting_app:latest
          docker push ghcr.io/mohamed-yasin-km/voting_app:latest
      
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/mohamed-yasin-km/voting_app:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      


